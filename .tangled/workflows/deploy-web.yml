when:
  - event: ["push"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - nodejs
    - pnpm
    - justbuild

steps: 
  - name: Install dependencies
    command: "pnpm install --frozen-lockfile && pnpm add -g wrangler"

  - name: Build
    command: "just dist-build-web"

  - name: Publish to Cloudflare Pages
    command: |
      wrangler pages deploy --branch canary
